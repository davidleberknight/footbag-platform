# =============================================================================
# Footbag Platform — Production overrides
#
# Applied on top of docker-compose.yml on the Lightsail host:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d
#
# Key differences from local dev:
#   - restart: always on nginx and web; worker is unless-stopped (long-running)
#   - Explicit memory limits to prevent OOM runaway
#   - DB volume path from env (not a hardcoded local path)
#   - No host port binding for web — traffic flows through nginx only
#   - Secrets and config injected from host environment / SSM at deploy time
#   - Bounded container log rotation on every service (json-file driver,
#     10 MB per file, 3 files retained) so stdout/stderr cannot fill the
#     Lightsail host disk.
# =============================================================================

x-log-rotation: &log-rotation
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  nginx:
    restart: always
    logging: *log-rotation
    environment:
      X_ORIGIN_VERIFY_SECRET: ${X_ORIGIN_VERIFY_SECRET:?must be set in /srv/footbag/env}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?must be set in /srv/footbag/env}
    deploy:
      resources:
        limits:
          # Memory limit is env-driven so the same compose overlay works for
          # staging (nano_3_0, 512M host) and production (medium_3_0, 4GB host)
          # without manual edits. Default 64M fits staging; the deploy seeds
          # NGINX_MEMORY_LIMIT=128M for production from docker/env/production.env,
          # giving headroom for the origin TLS, proxy-buffer, and gzip working
          # set at 2048 max connections.
          memory: ${NGINX_MEMORY_LIMIT:-64M}

  web:
    # Production must NOT bake the dev/staging-only subtrees (the persona
    # harness and the register-allowlist bootstrap). The prod overlay forces
    # INCLUDE_DEV_SHORTCUTS=0; the base compose default is 1 so dev/staging
    # images bundle them. deploy-rebuild.sh also exports INCLUDE_DEV_SHORTCUTS=0
    # when FOOTBAG_ENV=production (belt-and-suspenders).
    build:
      args:
        INCLUDE_DEV_SHORTCUTS: 0
    restart: always
    logging: *log-rotation
    volumes:
      # Directory bind mount so SQLite WAL/SHM sidecars live on the host and
      # are shared between web and worker containers. A file bind mount would
      # create container-local sidecars and split the WAL, making the worker
      # unable to see writes committed by web.
      - ${FOOTBAG_DB_DIR:-/srv/footbag/db}:/app/db:rw
      # Media uploads (avatars, photos). Persisted on host across deploys.
      - ${FOOTBAG_MEDIA_DIR:-/srv/footbag/media}:/app/s3-adapter-local:rw
      # AWS config/credentials for the source-profile -> assumed-role chain.
      # Root-owned on the host (0600); mounted read-only. Runtime reads
      # AWS_PROFILE from the environment and resolves it via sts:AssumeRole.
      - /root/.aws:/root/.aws:ro
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      # Exact X-Forwarded-For hop count of the chain in front of the app,
      # set per host in /srv/footbag/env: staging (CloudFront -> nginx) 2;
      # production 3 while the legacy front door proxies the apex, then 2 at
      # DNS handover. Unset falls back to the named ranges, which fail
      # closed: req.ip resolves to the CloudFront edge address and per-IP
      # rate limiting coarsens to per-edge buckets.
      TRUST_PROXY: ${TRUST_PROXY:-loopback, linklocal, uniquelocal}
      SESSION_SECRET: ${SESSION_SECRET}
      AWS_PROFILE: ${AWS_PROFILE:?must be set in /srv/footbag/env (assumed-role source profile)}
      AWS_REGION: ${AWS_REGION}
      JWT_SIGNER: ${JWT_SIGNER}
      JWT_KMS_KEY_ID: ${JWT_KMS_KEY_ID}
      SES_ADAPTER: ${SES_ADAPTER}
      SES_FROM_IDENTITY: ${SES_FROM_IDENTITY}
      SAFE_BROWSING_ADAPTER: ${SAFE_BROWSING_ADAPTER}
      HTTP_REACHABILITY_ADAPTER: ${HTTP_REACHABILITY_ADAPTER}
      # SecretsAdapter selector. Node consumers fetch SSM-stored third-party
      # secrets through this adapter. FOOTBAG_ENV derives the SSM parameter
      # prefix (/footbag/{env}/secrets/...).
      SECRETS_ADAPTER: ${SECRETS_ADAPTER}
      FOOTBAG_ENV: ${FOOTBAG_ENV}
      FOOTBAG_DB_PATH: /app/db/footbag.db
      IMAGE_PROCESSOR_URL: ${IMAGE_PROCESSOR_URL:-http://image:4000}
      MEDIA_STORAGE_ADAPTER: ${MEDIA_STORAGE_ADAPTER:?must be set in /srv/footbag/env (deploy scripts seed s3)}
      MEDIA_STORAGE_S3_BUCKET: ${MEDIA_STORAGE_S3_BUCKET:-}
      PAYMENT_ADAPTER: ${PAYMENT_ADAPTER:?must be set in /srv/footbag/env (live for production after Stripe-SDK lands, stub for staging)}
      # Optional passthrough: env.ts requires it only when PAYMENT_ADAPTER=live
      # (production); staging runs stub and leaves it unset. Production sources
      # the value from SSM into /srv/footbag/env.
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Async curator video upload: web POSTs /transcode/dispatch to the worker
      # container (see src/transcodeWorker.ts). Worker pushes state events back
      # to /ipc/job-events on web. INTERNAL_EVENT_SECRET authenticates
      # both directions.
      WORKER_INTERNAL_URL: ${WORKER_INTERNAL_URL:-http://worker:3100}
      WEB_INTERNAL_URL: ${WEB_INTERNAL_URL:-http://web:3000}
      INTERNAL_EVENT_SECRET: ${INTERNAL_EVENT_SECRET:?must be set in /srv/footbag/env (worker<->web auth)}
      # Dedicated SNS feedback-webhook key: the subscription URL carries it in
      # the query string, where access logs capture it, so it must not be the
      # same secret that authenticates the worker IPC endpoints. Empty is
      # allowed here because the runtime requires it only when SES_ADAPTER=live
      # (production); env.ts fail-fasts there. scripts/activate-ses-feedback.sh
      # provisions it at live-email activation.
      SES_FEEDBACK_WEBHOOK_KEY: ${SES_FEEDBACK_WEBHOOK_KEY:-}
      # This overlay is applied on BOTH staging and production hosts (per the
      # header comment). The env-var passthrough below is required for staging
      # (where the dev/staging admin-bootstrap allowlist is active) and is a
      # no-op on production: the deploy pipeline refuses to write the value
      # into /srv/footbag/env on a production host (scripts/internal/deploy-*-
      # remote.sh), and env.ts boot-fail-fasts if the var is set with
      # FOOTBAG_ENV=production. Production-first-admin uses the separate SSM-
      # token claim path documented in DESIGN_DECISIONS §3.6.
      FOOTBAG_DEV_INITIAL_ADMIN_EMAILS: ${FOOTBAG_DEV_INITIAL_ADMIN_EMAILS:-}
    deploy:
      resources:
        limits:
          # Memory limit is env-driven so the same compose overlay works for
          # staging (nano_3_0, 512M host) and production (medium_3_0, 4GB host)
          # without manual edits. Default 192M fits staging; production
          # /srv/footbag/env sets WEB_MEMORY_LIMIT=512M. Web no longer runs
          # Sharp inline (image worker handles it via HTTP), so the staging
          # trim is safe at the current load.
          memory: ${WEB_MEMORY_LIMIT:-192M}

  worker:
    # Production must NOT bake the dev/staging-only subtrees
    # (same rationale as the web override above).
    build:
      args:
        INCLUDE_DEV_SHORTCUTS: 0
    # Email-outbox polling loop (src/worker.ts). Restart on crash or host
    # reboot so the outbox keeps draining. SIGTERM-clean exit loop in
    # src/worker.ts handles graceful shutdown on `docker compose down` and
    # systemd stop.
    restart: unless-stopped
    logging: *log-rotation
    volumes:
      # Directory bind mount — must match web so WAL/SHM sidecars are shared.
      - ${FOOTBAG_DB_DIR:-/srv/footbag/db}:/app/db:rw
      # AWS config/credentials for the email-outbox worker: read-only
      # source-profile keys at /root/.aws plus the AssumeRole chain to the
      # runtime role. Matches the web-service mount above.
      - /root/.aws:/root/.aws:ro
    environment:
      PORT: "3000"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      AWS_PROFILE: ${AWS_PROFILE:?must be set in /srv/footbag/env (assumed-role source profile)}
      AWS_REGION: ${AWS_REGION}
      JWT_SIGNER: ${JWT_SIGNER}
      JWT_KMS_KEY_ID: ${JWT_KMS_KEY_ID}
      SES_ADAPTER: ${SES_ADAPTER}
      SES_FROM_IDENTITY: ${SES_FROM_IDENTITY}
      SAFE_BROWSING_ADAPTER: ${SAFE_BROWSING_ADAPTER}
      HTTP_REACHABILITY_ADAPTER: ${HTTP_REACHABILITY_ADAPTER}
      # SecretsAdapter selector. Node consumers fetch SSM-stored third-party
      # secrets through this adapter. FOOTBAG_ENV derives the SSM parameter
      # prefix (/footbag/{env}/secrets/...).
      SECRETS_ADAPTER: ${SECRETS_ADAPTER}
      FOOTBAG_ENV: ${FOOTBAG_ENV}
      FOOTBAG_DB_PATH: /app/db/footbag.db
      IMAGE_PROCESSOR_URL: ${IMAGE_PROCESSOR_URL:-http://image:4000}
      MEDIA_STORAGE_ADAPTER: ${MEDIA_STORAGE_ADAPTER:?must be set in /srv/footbag/env (deploy scripts seed s3)}
      MEDIA_STORAGE_S3_BUCKET: ${MEDIA_STORAGE_S3_BUCKET:-}
      PAYMENT_ADAPTER: ${PAYMENT_ADAPTER:?must be set in /srv/footbag/env (live for production after Stripe-SDK lands, stub for staging)}
      # Optional passthrough: env.ts requires it only when PAYMENT_ADAPTER=live
      # (production); staging runs stub and leaves it unset. Production sources
      # the value from SSM into /srv/footbag/env.
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Curator video transcode dispatch HTTP server (src/transcodeWorker.ts)
      # runs alongside the email-outbox loop in this same node process. Web
      # container POSTs /transcode/dispatch to ${WORKER_INTERNAL_URL}; worker
      # POSTs state events back to ${WEB_INTERNAL_URL}/ipc/job-events.
      WORKER_INTERNAL_PORT: "3100"
      WORKER_INTERNAL_URL: ${WORKER_INTERNAL_URL:-http://worker:3100}
      WEB_INTERNAL_URL: ${WEB_INTERNAL_URL:-http://web:3000}
      INTERNAL_EVENT_SECRET: ${INTERNAL_EVENT_SECRET:?must be set in /srv/footbag/env (worker<->web auth)}
      SES_FEEDBACK_WEBHOOK_KEY: ${SES_FEEDBACK_WEBHOOK_KEY:-}
    deploy:
      resources:
        limits:
          # Memory limit is env-driven (see web service). Default 96M fits
          # staging (nano_3_0); production /srv/footbag/env sets
          # WORKER_MEMORY_LIMIT=384M. Worker is a minimal email-outbox
          # polling loop plus AP-expiry daily loop plus transcode HTTP
          # dispatch; the staging trim is safe at the current load.
          memory: ${WORKER_MEMORY_LIMIT:-96M}

  # Image processing worker. Scaled-down sizing for single-image-at-a-time
  # avatar testing on Lightsail nano_3_0 (512M host); the production
  # medium_3_0 (4GB host) sets `IMAGE_MEMORY_LIMIT=896M` and
  # `IMAGE_MAX_CONCURRENT=2` via /srv/footbag/env.
  #
  # OOM kills are an expected condition under the scaled-down limit (high
  # pixel-count inputs decoded by Sharp can exceed 256M of RGBA). Defenses:
  #   - IMAGE_MAX_CONCURRENT=1 caps in-flight Sharp ops to one
  #   - `restart: always` brings the container back automatically on OOM-kill
  #   - healthcheck flips unhealthy on kill, back to healthy in ~30s
  #   - in-flight web requests see ECONNRESET, mapped to ImageProcessingError
  #     and a 5xx user-facing response by the HTTP adapter
  image:
    # Production must NOT bake the dev/staging-only subtrees
    # (same rationale as the web/worker overrides above).
    build:
      args:
        INCLUDE_DEV_SHORTCUTS: 0
    restart: always
    logging: *log-rotation
    # No /root/.aws mount: this container holds NO AWS credentials. The from-
    # storage video transcode route receives presigned GET + PUT URLs from the
    # web container and uses fetch() against those opaque URLs. Eliminates
    # SEC-D02 (untrusted ffmpeg/Sharp runtime holding source-profile keys).
    environment:
      NODE_ENV: production
      IMAGE_PORT: "4000"
      # Scaled to 1 for nano_3_0; production target is 2.
      IMAGE_MAX_CONCURRENT: ${IMAGE_MAX_CONCURRENT:-1}
      # libx264 tuning. Unset uses the canonical preset=medium, auto-thread,
      # rc-lookahead=40 and requires ~150-200M of working set on top of the
      # Node + libav baseline. On the 256M nano_3_0 image container that
      # combination cgroup-OOMs at frame 0; the staging env file overrides to
      # preset=veryfast, threads=1, rc-lookahead=10 (~50-80M working set).
      # Production sets none of these, so the empty fallback passes through and
      # the worker uses the canonical encode quality.
      VIDEO_X264_PRESET: ${VIDEO_X264_PRESET:-}
      VIDEO_X264_THREADS: ${VIDEO_X264_THREADS:-}
      VIDEO_X264_RC_LOOKAHEAD: ${VIDEO_X264_RC_LOOKAHEAD:-}
      # Shared secret used by the image worker to authenticate /process/*
      # callers. Same value as the web<->worker channel; web's adapters set
      # it on the x-internal-secret header.
      INTERNAL_EVENT_SECRET: ${INTERNAL_EVENT_SECRET:?must be set in /srv/footbag/env (web<->image auth)}
    deploy:
      resources:
        limits:
          # Memory limit is env-driven (see web service). Default 256M fits
          # staging (nano_3_0); production /srv/footbag/env sets
          # IMAGE_MEMORY_LIMIT=896M plus IMAGE_MAX_CONCURRENT=2 to take full
          # advantage of the production 4GB host.
          memory: ${IMAGE_MEMORY_LIMIT:-256M}
