# =============================================================================
# Footbag Platform — Local development / parity stack
#
# Usage:
#   # First-time setup: build the local DB (requires sqlite3 CLI or use Node):
#   ./scripts/reset-local-db.sh
#
#   # Bring the stack up. ONE command, foreground, with auto-teardown on
#   # Ctrl+C / exit / crash. Runs scripts/compose-dev.sh which wires up the
#   # project-root .env and traps cleanup so no manual `down` is needed:
#   npm run compose:dev
#
#   # Smoke check from a second terminal (the stack holds the first):
#   BASE_URL=http://localhost ./scripts/smoke-local.sh
#
# The SQLite database file is mounted from the host so you can inspect it
# directly with the sqlite3 CLI or DB Browser for SQLite.
#
# This stack runs NODE_ENV=production for parity with the deployed
# environment. Required env vars (JWT_SIGNER, SES_ADAPTER, etc.) have
# `${VAR:-default}` passthroughs below that fall back to local-friendly
# defaults (local crypto, stub email); override via project-root .env.
# =============================================================================

services:

  # ── nginx reverse proxy ───────────────────────────────────────────────────
  # Uses the upstream nginx:1.25-alpine image directly (no custom build) so
  # `docker compose build` does no work on the host for nginx — the staging
  # Lightsail bundle (nano_3_0, 512 MB RAM) cannot afford an extra build
  # target without OOM-killing sshd. The entrypoint script is bind-mounted
  # into /docker-entrypoint.d/ instead of COPY'd into a custom image; the
  # script uses `sed` (built into Alpine) instead of `envsubst` (which would
  # require adding the gettext package and re-introducing a custom build).
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    environment:
      X_ORIGIN_VERIFY_SECRET: "${X_ORIGIN_VERIFY_SECRET:-}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost}"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./nginx/40-render-nginx-conf.sh:/docker-entrypoint.d/40-render-nginx-conf.sh:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  # ── Node.js web application ───────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
      args:
        # CUTOVER-REMOVE: dev-shortcuts inclusion.
        # Current: subtree included in staging images
        #   (INCLUDE_DEV_SHORTCUTS=1 default here); prod overlay forces 0.
        #   The Dockerfile ARG itself defaults to 0; this compose file's
        #   default keeps staging builds self-sufficient.
        # Target: remove this ARG entirely after production cutover.
        INCLUDE_DEV_SHORTCUTS: ${INCLUDE_DEV_SHORTCUTS:-1}
    expose:
      - "3000"
    environment:
      # NODE_ENV=production keeps this stack a parity test of the deployed
      # configuration. Prod-mode env.ts requires JWT_SIGNER, SES_ADAPTER,
      # IMAGE_PROCESSOR_URL, and a non-placeholder
      # SESSION_SECRET; the ${VAR:-default} passthroughs below let the
      # parity stack come up with sensible local defaults (local crypto +
      # stub email) while still letting an operator override per-var via
      # the project-root .env file.
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: info
      FOOTBAG_DB_PATH: /app/db/footbag.db
      PUBLIC_BASE_URL: http://localhost
      SESSION_SECRET: ${SESSION_SECRET}
      IMAGE_PROCESSOR_URL: http://image:4000
      JWT_SIGNER: ${JWT_SIGNER:-local}
      JWT_KMS_KEY_ID: ${JWT_KMS_KEY_ID:-}
      SES_ADAPTER: ${SES_ADAPTER:-stub}
      SES_FROM_IDENTITY: ${SES_FROM_IDENTITY:-}
      SAFE_BROWSING_ADAPTER: ${SAFE_BROWSING_ADAPTER:-stub}
      HTTP_REACHABILITY_ADAPTER: ${HTTP_REACHABILITY_ADAPTER:-stub}
      # X-Forwarded-For hop count for Express trust-proxy. This stack fronts
      # web with nginx only, so the local default is 1. Staging/production
      # hosts set their real chain length in /srv/footbag/env.
      TRUST_PROXY: ${TRUST_PROXY:-1}
      # SecretsAdapter selector. Local-default reads .local/secrets.json for
      # dev parity; staging/prod override to 'live' via /srv/footbag/env.
      # FOOTBAG_ENV is required when SECRETS_ADAPTER=live; it derives the
      # SSM parameter prefix (/footbag/{env}/secrets/...).
      SECRETS_ADAPTER: ${SECRETS_ADAPTER:-local}
      FOOTBAG_ENV: ${FOOTBAG_ENV:-development}
      AWS_REGION: ${AWS_REGION:-}
      MEDIA_STORAGE_ADAPTER: ${MEDIA_STORAGE_ADAPTER:-local}
      MEDIA_STORAGE_S3_BUCKET: ${MEDIA_STORAGE_S3_BUCKET:-}
      PAYMENT_ADAPTER: ${PAYMENT_ADAPTER:-stub}
      # Unused in stub mode (stub adapter uses its own whsec_stub secret);
      # required by env.ts boot only when PAYMENT_ADAPTER=live.
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      FOOTBAG_DEV_INITIAL_ADMIN_EMAILS: ${FOOTBAG_DEV_INITIAL_ADMIN_EMAILS:-}
      # Shared secret for web<->image auth (and web<->worker, in s3 mode).
      # Local-default is fine here because the parity stack runs on a private
      # docker network; override via project-root .env when running against
      # real AWS resources.
      INTERNAL_EVENT_SECRET: ${INTERNAL_EVENT_SECRET:-dev-internal-event-secret-not-for-prod}
      # Dedicated SNS feedback-webhook key: separate from INTERNAL_EVENT_SECRET
      # because the subscription URL carries it in the query string, where
      # access logs capture it.
      SES_FEEDBACK_WEBHOOK_KEY: ${SES_FEEDBACK_WEBHOOK_KEY:-dev-ses-feedback-key-not-for-prod}
    volumes:
      # Directory bind mount so SQLite WAL/SHM sidecars live on the host and
      # are shared between web and worker containers. A file bind mount would
      # create container-local sidecars and split the WAL.
      - ../database:/app/db:rw
      # Local storage-adapter backing: the dev stand-in for the S3 bucket
      # (avatars, member uploads, and curated media seeded for local rendering).
      # Dev-only; never shipped to S3.
      - ../s3-adapter-local:/app/s3-adapter-local:rw
    depends_on:
      image:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/live"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Image processing worker ───────────────────────────────────────────────
  # Standalone Sharp pipeline behind an HTTP boundary. Web POSTs raw bytes
  # to /process/avatar and gets back base64-encoded thumb + display variants.
  # Reachable only on the docker network (no host port binding); web finds
  # it by service name (image:4000). Stateless: no DB, no media, no AWS.
  image:
    build:
      context: ..
      dockerfile: docker/image/Dockerfile
      args:
        INCLUDE_DEV_SHORTCUTS: ${INCLUDE_DEV_SHORTCUTS:-1}
    expose:
      - "4000"
    environment:
      NODE_ENV: production
      IMAGE_PORT: "4000"
      IMAGE_MAX_CONCURRENT: "2"
      LOG_LEVEL: info
      INTERNAL_EVENT_SECRET: ${INTERNAL_EVENT_SECRET:-dev-internal-event-secret-not-for-prod}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Background worker ─────────────────────────────────────────────────────
  # Runs the AP expiry loop and the email outbox drain. Long-running.
  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
      args:
        INCLUDE_DEV_SHORTCUTS: ${INCLUDE_DEV_SHORTCUTS:-1}
    environment:
      # Worker imports src/config/env.ts the same way web does, so it must
      # supply the same prod-mode env.ts contract (PORT, PUBLIC_BASE_URL,
      # SESSION_SECRET, IMAGE_PROCESSOR_URL, JWT_SIGNER, SES_ADAPTER, etc.)
      # even though it does not bind a port or call the image worker.
      # Defense-in-depth: every container exits fast on a misconfigured
      # parity stack, not just web.
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: info
      FOOTBAG_DB_PATH: /app/db/footbag.db
      PUBLIC_BASE_URL: http://localhost
      SESSION_SECRET: ${SESSION_SECRET}
      IMAGE_PROCESSOR_URL: http://image:4000
      JWT_SIGNER: ${JWT_SIGNER:-local}
      JWT_KMS_KEY_ID: ${JWT_KMS_KEY_ID:-}
      SES_ADAPTER: ${SES_ADAPTER:-stub}
      SES_FROM_IDENTITY: ${SES_FROM_IDENTITY:-}
      SAFE_BROWSING_ADAPTER: ${SAFE_BROWSING_ADAPTER:-stub}
      HTTP_REACHABILITY_ADAPTER: ${HTTP_REACHABILITY_ADAPTER:-stub}
      # SecretsAdapter selector. Local-default reads .local/secrets.json for
      # dev parity; staging/prod override to 'live' via /srv/footbag/env.
      # FOOTBAG_ENV is required when SECRETS_ADAPTER=live; it derives the
      # SSM parameter prefix (/footbag/{env}/secrets/...).
      SECRETS_ADAPTER: ${SECRETS_ADAPTER:-local}
      FOOTBAG_ENV: ${FOOTBAG_ENV:-development}
      AWS_REGION: ${AWS_REGION:-}
      MEDIA_STORAGE_ADAPTER: ${MEDIA_STORAGE_ADAPTER:-local}
      MEDIA_STORAGE_S3_BUCKET: ${MEDIA_STORAGE_S3_BUCKET:-}
      PAYMENT_ADAPTER: ${PAYMENT_ADAPTER:-stub}
      # Unused in stub mode (stub adapter uses its own whsec_stub secret);
      # required by env.ts boot only when PAYMENT_ADAPTER=live.
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      INTERNAL_EVENT_SECRET: ${INTERNAL_EVENT_SECRET:-dev-internal-event-secret-not-for-prod}
      SES_FEEDBACK_WEBHOOK_KEY: ${SES_FEEDBACK_WEBHOOK_KEY:-dev-ses-feedback-key-not-for-prod}
    volumes:
      # Directory bind mount — must match web so WAL/SHM sidecars are shared.
      - ../database:/app/db:rw
    restart: unless-stopped
    # Worker exposes GET /health on workerInternalPort (default 3100) from
    # transcodeWorker.ts. Probes the same endpoint the web container uses
    # to dispatch transcode jobs, so a worker that can't accept dispatches
    # is also reported unhealthy here. Default 30s interval is conservative;
    # tighten in the prod overlay if AP-expiry latency demands faster
    # failure detection.
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:'+(process.env.WORKER_INTERNAL_PORT||3100)+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
