name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

# Least privilege: every job reads the repo and nothing else. A job that one
# day needs more (e.g. PR comments) takes a job-level override rather than
# widening the whole workflow.
permissions:
  contents: read

# Third-party actions are pinned to commit SHAs (tag comments are for humans):
# a force-pushed tag must not be able to swap the code CI executes.

jobs:
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (moderate+)
        run: npm run audit

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so gitleaks scans every commit in the push, not just
          # the checkout snapshot.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  conventions:
    name: Convention gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run convention gate
        run: bash scripts/ci/assert_conventions.sh

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  db-load-smoke:
    name: DB load smoke (loader regression gate)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install sqlite3 CLI + ffmpeg
        # ffmpeg: required by scripts/seed_curator_media.py to
        # transcode the demo-loop sources through the curator pipeline (DD §6.8).
        run: sudo apt-get update && sudo apt-get install -y sqlite3 ffmpeg

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Stage CI fixtures into pipeline paths
        run: bash scripts/ci/stage_loader_smoke_fixtures.sh

      - name: Run reset-local-db.sh against fixtures
        env:
          FOOTBAG_DB_PATH: ./database/footbag-ci.db
          STUB_PASSWORD: ci-not-a-real-password
        run: bash scripts/reset-local-db.sh

      - name: Assert per-table row counts
        run: python3 scripts/ci/assert_loader_row_counts.py --db ./database/footbag-ci.db

  e2e:
    name: E2E click-through
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install sqlite3 CLI
        # scripts/e2e/start-stack.sh applies database/schema.sql via sqlite3.
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-trace
          path: tests/test-results/
          if-no-files-found: ignore

  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest

    # CodeQL uploads its findings to the code-scanning API; that single write
    # scope is the one job that needs more than the workflow-wide read-only
    # default, so it takes a job-level override rather than widening the whole
    # workflow.
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Analyze
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3

  ci-complete:
    name: Type-check and test
    needs: [typecheck, lint, dependency-audit, secret-scan, conventions, unit-tests, integration-tests, db-load-smoke, e2e, codeql, terraform]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.dependency-audit.result }}" != "success" ] || \
             [ "${{ needs.secret-scan.result }}" != "success" ] || \
             [ "${{ needs.conventions.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.db-load-smoke.result }}" != "success" ] || \
             [ "${{ needs.e2e.result }}" != "success" ] || \
             [ "${{ needs.codeql.result }}" != "success" ] || \
             [ "${{ needs.terraform.result }}" != "success" ]; then
            echo "One or more jobs failed:"
            echo "  typecheck: ${{ needs.typecheck.result }}"
            echo "  lint: ${{ needs.lint.result }}"
            echo "  dependency-audit: ${{ needs.dependency-audit.result }}"
            echo "  secret-scan: ${{ needs.secret-scan.result }}"
            echo "  conventions: ${{ needs.conventions.result }}"
            echo "  unit-tests: ${{ needs.unit-tests.result }}"
            echo "  integration-tests: ${{ needs.integration-tests.result }}"
            echo "  db-load-smoke: ${{ needs.db-load-smoke.result }}"
            echo "  e2e: ${{ needs.e2e.result }}"
            echo "  codeql: ${{ needs.codeql.result }}"
            echo "  terraform: ${{ needs.terraform.result }}"
            exit 1
          fi

  terraform:
    name: Terraform fmt / validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: terraform validate (staging)
        working-directory: terraform/staging
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (production)
        working-directory: terraform/production
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (shared)
        working-directory: terraform/shared
        run: |
          terraform init -backend=false
          terraform validate
