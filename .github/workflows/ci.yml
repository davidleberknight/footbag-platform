name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run build

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  ci-complete:
    name: Type-check and test
    needs: [typecheck, unit-tests, integration-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "One or more jobs failed:"
            echo "  typecheck: ${{ needs.typecheck.result }}"
            echo "  unit-tests: ${{ needs.unit-tests.result }}"
            echo "  integration-tests: ${{ needs.integration-tests.result }}"
            exit 1
          fi

  terraform:
    name: Terraform fmt / validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: terraform validate (staging)
        working-directory: terraform/staging
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (production)
        working-directory: terraform/production
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (shared)
        working-directory: terraform/shared
        run: |
          terraform init -backend=false
          terraform validate
