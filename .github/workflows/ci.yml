name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run build

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  db-load-smoke:
    name: DB load smoke (loader regression gate)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install sqlite3 CLI
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Stage CI fixtures into pipeline paths
        run: bash scripts/ci/stage_loader_smoke_fixtures.sh

      - name: Run reset-local-db.sh against fixtures
        env:
          FOOTBAG_DB_PATH: ./database/footbag-ci.db
          FOOTBAG_MIRROR_AGE_ACK: '1'
          STUB_PASSWORD: ci-not-a-real-password
        run: bash scripts/reset-local-db.sh

      - name: Assert per-table row counts
        run: python3 scripts/ci/assert_loader_row_counts.py --db ./database/footbag-ci.db

  ci-complete:
    name: Type-check and test
    needs: [typecheck, unit-tests, integration-tests, db-load-smoke]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.db-load-smoke.result }}" != "success" ]; then
            echo "One or more jobs failed:"
            echo "  typecheck: ${{ needs.typecheck.result }}"
            echo "  unit-tests: ${{ needs.unit-tests.result }}"
            echo "  integration-tests: ${{ needs.integration-tests.result }}"
            echo "  db-load-smoke: ${{ needs.db-load-smoke.result }}"
            exit 1
          fi

  terraform:
    name: Terraform fmt / validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: terraform validate (staging)
        working-directory: terraform/staging
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (production)
        working-directory: terraform/production
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (shared)
        working-directory: terraform/shared
        run: |
          terraform init -backend=false
          terraform validate
