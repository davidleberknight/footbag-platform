name: Bug report
description: General application bug
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. A few notes before you start:

        - Do not paste passwords, tokens, signing material, member email addresses, real names of current members, phone numbers, or other PII. Redact before submitting.
        - Do not attach screenshots that contain member data or raw legacy archive contents.
        - For security vulnerabilities, use the private disclosure path in SECURITY.md, not this form.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps that let a maintainer reproduce the bug locally.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - local
        - staging
        - production
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Triager may adjust; pick your best read.
      options:
        - blocker
        - major
        - normal
        - minor
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - auth
        - migration
        - onboarding
        - clubs
        - members
        - events
        - media
        - admin
        - staging
        - docs
        - security
    validations:
      required: true
  - type: dropdown
    id: user_role
    attributes:
      label: User role at time of bug
      options:
        - anonymous
        - member
        - club leader
        - admin
        - event organizer
        - legacy claimant
    validations:
      required: true
  - type: checkboxes
    id: regression_commitment
    attributes:
      label: Regression test commitment
      description: Per `.claude/rules/testing.md` mandate 1, every bug fix lands a regression test at the cheapest appropriate layer. The issue stays open until the regression test is merged.
      options:
        - label: I understand the bug fix lands with a regression test, and this issue will not close until the test is merged.
          required: true
